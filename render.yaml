services:
  - type: web
    name: lol-scouting-app
    runtime: node
    plan: free
    buildCommand: "npm install && cd ../frontend && npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lol_db
          property: connectionString
      - key: RIOT_API_KEY
        sync: false # Set this in Render Dashboard for security
      - key: NODE_VERSION
        value: 20

databases:
  - name: lol_db
    plan: free
    databaseName: lol_stats
    user: postgres
