services:
  - type: web
    name: lol-scouting-app
    runtime: node
    plan: free
    buildCommand: "cd backend && npm install && cd ../frontend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lol_db
          property: connectionString
      - key: RIOT_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20

databases:
  - name: lol_db
    plan: free
